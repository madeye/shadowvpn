# Docker-based multi-client end-to-end test for ShadowVPN server-side NAT.
#
# Brings up one server (with --nat) and three clients that all run the SAME
# static config (same placeholder tunnel IP) on a private bridge. The server
# tells them apart by UDP endpoint and maps each onto a distinct internal IP. The
# driver (run-e2e-multi.sh) checks that every client reaches the server through
# the tunnel and that the server allocated a distinct internal IP per client.
#
#   docker/run-e2e-multi.sh            # or set CIPHER=aes-256-gcm

x-shadowvpn: &shadowvpn
  build:
    context: ..
    dockerfile: docker/Dockerfile
  image: shadowvpn-e2e:latest
  cap_add:
    - NET_ADMIN
  devices:
    - /dev/net/tun
  environment:
    CIPHER: ${CIPHER:-chacha20-poly1305}
    RUST_LOG: ${RUST_LOG:-info}

services:
  server:
    <<: *shadowvpn
    container_name: svpn-multi-server
    command: ["run-server-multi.sh"]

  client1:
    <<: *shadowvpn
    container_name: svpn-multi-client1
    depends_on: [server]
    command: ["run-client-multi.sh"]

  client2:
    <<: *shadowvpn
    container_name: svpn-multi-client2
    depends_on: [server]
    command: ["run-client-multi.sh"]

  client3:
    <<: *shadowvpn
    container_name: svpn-multi-client3
    depends_on: [server]
    command: ["run-client-multi.sh"]
