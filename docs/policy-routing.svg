<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 470" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" role="img" aria-label="ShadowVPN client policy routing">
  <defs>
    <marker id="pa" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8b949e"/>
    </marker>
    <marker id="pad" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a371f7"/>
    </marker>
    <style>
      .panel{fill:#0d1117}
      .title{fill:#e6edf3;font-size:20px;font-weight:700}
      .hdr{fill:#8b949e;font-size:13px;font-weight:600;letter-spacing:.07em;text-transform:uppercase}
      .box{fill:#161b22;stroke:#30363d;stroke-width:1.5}
      .acc{stroke:#58a6ff}.enc{stroke:#d29922}.net{stroke:#3fb950}.dec{stroke:#a371f7}
      .t{fill:#e6edf3;font-size:15px;font-weight:600}
      .s{fill:#8b949e;font-size:12px}
      .flow{stroke:#8b949e;stroke-width:2;fill:none}
      .inst{stroke:#a371f7;stroke-width:1.6;fill:none;stroke-dasharray:5 4}
      .lbl{fill:#6e7681;font-size:12px;font-weight:600}
      .divider{stroke:#21262d;stroke-width:1}
    </style>
  </defs>

  <rect class="panel" x="0" y="0" width="1160" height="470" rx="16"/>
  <text class="title" x="28" y="40">Client policy routing — user-mode, no ipset / nft</text>

  <!-- ===== control plane ===== -->
  <text class="hdr" x="28" y="74">Control plane · split-DNS → route install</text>

  <g>
    <rect class="box" x="28" y="92" width="150" height="70" rx="10"/>
    <text class="t" x="103" y="124" text-anchor="middle">DNS query</text>
    <text class="s" x="103" y="144" text-anchor="middle">from apps</text>
  </g>
  <g>
    <rect class="box acc" x="214" y="92" width="200" height="70" rx="10"/>
    <text class="t" x="314" y="122" text-anchor="middle">split-DNS proxy</text>
    <text class="s" x="314" y="143" text-anchor="middle">gfwlist · chinadns (GeoIP)</text>
  </g>
  <g>
    <rect class="box dec" x="452" y="88" width="168" height="78" rx="10"/>
    <text class="t" x="536" y="120" text-anchor="middle">tunnel</text>
    <text class="t" x="536" y="139" text-anchor="middle">this name?</text>
  </g>
  <g>
    <rect class="box dec" x="676" y="44" width="300" height="64" rx="10"/>
    <text class="t" x="826" y="72" text-anchor="middle">TunRouter: add &lt;ip&gt;/32 → tun</text>
    <text class="s" x="826" y="92" text-anchor="middle">rtnetlink (Linux) · PF_ROUTE (macOS)</text>
  </g>
  <g>
    <rect class="box net" x="676" y="150" width="300" height="60" rx="10"/>
    <text class="t" x="826" y="178" text-anchor="middle">resolve &amp; leave on direct path</text>
    <text class="s" x="826" y="197" text-anchor="middle">via local DNS</text>
  </g>

  <path class="flow" d="M178,127 L210,127" marker-end="url(#pa)"/>
  <path class="flow" d="M414,127 L448,127" marker-end="url(#pa)"/>
  <path class="flow" d="M620,118 L648,118 L648,76 L672,76" marker-end="url(#pa)"/>
  <text class="lbl" x="640" y="66" fill="#56d364">yes</text>
  <path class="flow" d="M620,138 L648,138 L648,180 L672,180" marker-end="url(#pa)"/>
  <text class="lbl" x="638" y="200">no</text>

  <line class="divider" x1="28" y1="244" x2="1132" y2="244"/>

  <!-- ===== data plane ===== -->
  <text class="hdr" x="28" y="276">Data plane · the routing table picks the path</text>

  <g>
    <rect class="box" x="28" y="296" width="150" height="70" rx="10"/>
    <text class="t" x="103" y="328" text-anchor="middle">app packet</text>
    <text class="s" x="103" y="348" text-anchor="middle">to some dst IP</text>
  </g>
  <g>
    <rect class="box acc" x="214" y="296" width="200" height="70" rx="10"/>
    <text class="t" x="314" y="328" text-anchor="middle">routing table</text>
    <text class="s" x="314" y="348" text-anchor="middle">most-specific route wins</text>
  </g>
  <g>
    <rect class="box enc" x="452" y="262" width="290" height="62" rx="10"/>
    <text class="t" x="597" y="289" text-anchor="middle">dst has /32 → TUN</text>
    <text class="s" x="597" y="309" text-anchor="middle">encrypt → server (NAT) → Internet</text>
  </g>
  <g>
    <rect class="box net" x="452" y="338" width="290" height="62" rx="10"/>
    <text class="t" x="597" y="365" text-anchor="middle">default route → Internet</text>
    <text class="s" x="597" y="385" text-anchor="middle">direct, full kernel speed</text>
  </g>
  <g>
    <ellipse cx="838" cy="293" rx="58" ry="34" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>
    <text class="t" x="838" y="298" text-anchor="middle" font-size="14">via tunnel</text>
  </g>
  <g>
    <ellipse cx="838" cy="369" rx="58" ry="34" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
    <text class="t" x="838" y="374" text-anchor="middle" font-size="14">direct</text>
  </g>

  <path class="flow" d="M178,331 L210,331" marker-end="url(#pa)"/>
  <path class="flow" d="M414,322 L432,322 L432,293 L448,293" marker-end="url(#pa)"/>
  <text class="lbl" x="404" y="308" fill="#f0c674">tunneled IP</text>
  <path class="flow" d="M414,340 L432,340 L432,369 L448,369" marker-end="url(#pa)"/>
  <text class="lbl" x="402" y="392">everything else</text>
  <path class="flow" d="M742,293 L776,293" marker-end="url(#pa)"/>
  <path class="flow" d="M742,369 L776,369" marker-end="url(#pa)"/>

  <!-- installs route: control plane influences data plane -->
  <path class="inst" d="M826,108 L826,128 L1058,128 L1058,322 L1010,322" marker-end="url(#pad)"/>
  <text class="lbl" x="1074" y="226" fill="#a371f7" text-anchor="middle" transform="rotate(90 1074 226)">installs the /32 route</text>
</svg>
