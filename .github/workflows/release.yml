name: Release

# Build per-platform packages (binaries + scripts + service files) and attach
# them to a GitHub Release. Triggered by pushing a semver tag (e.g. `v0.1.0`);
# also runnable manually (workflow_dispatch) to produce artifacts without
# publishing a release.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # needed to create the GitHub Release and upload assets

env:
  CARGO_TERM_COLOR: always
  # Wintun userspace TUN driver bundled into the Windows client packages. Pin a
  # known release; the correct CPU-arch DLL is selected per target at package time.
  WINTUN_VERSION: "0.14.1"
  # GeoLite2 Country database bundled into the Windows client packages (used by
  # the client's chinadns `geoip` mode). MaxMind requires an account to download
  # from source, so we pull a redistributed mirror; override to use your own.
  GEOIP_MMDB_URL: "https://raw.githubusercontent.com/P3TERX/GeoLite.mmdb/download/GeoLite2-Country.mmdb"

jobs:
  package:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-latest }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-latest }
          - { target: x86_64-apple-darwin, os: macos-latest }
          - { target: aarch64-apple-darwin, os: macos-latest }
          - { target: x86_64-pc-windows-msvc, os: windows-latest }
          - { target: aarch64-pc-windows-msvc, os: windows-latest }
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      # aarch64 Linux is cross-compiled from the x86_64 runner, so it needs the
      # GNU cross linker. The crate graph is pure Rust + libc (no C deps), so the
      # linker is all that's required.
      - name: Install aarch64 Linux cross linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p .cargo
          {
            echo "[target.aarch64-unknown-linux-gnu]"
            echo "linker = \"aarch64-linux-gnu-gcc\""
          } >> .cargo/config.toml

      - name: Build binaries
        run: cargo build --release --locked --bins --target ${{ matrix.target }}

      # Resolve a human version string for the archive name: strip the leading
      # `v` from a tag, otherwise use the short SHA for manual/dispatch builds.
      - name: Compute version
        id: ver
        shell: bash
        run: |
          ref="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${ref#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          fi

      # Assemble the package (Unix: tar.gz). Each archive contains a single
      # top-level dir so it extracts cleanly.
      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          name="shadowvpn-${{ steps.ver.outputs.version }}-${{ matrix.target }}"
          stage="dist-stage/$name"
          mkdir -p "$stage"
          bin="target/${{ matrix.target }}/release"
          cp "$bin/shadowvpn-server" "$bin/shadowvpn-client" "$stage/"
          cp LICENSE README.md "$stage/"
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            mkdir -p "$stage/systemd"
            cp dist/systemd/shadowvpn-server.service dist/systemd/shadowvpn-client.service "$stage/systemd/"
            cp dist/README.md "$stage/SERVICES.md"
          else # macOS
            mkdir -p "$stage/launchd"
            cp dist/launchd/io.github.madeye.shadowvpn-client.plist "$stage/launchd/"
            cp dist/README.md "$stage/SERVICES.md"
          fi
          tar -C dist-stage -czf "$name.tar.gz" "$name"
          echo "ASSET=$name.tar.gz" >> "$GITHUB_ENV"

      # Assemble the package (Windows: zip). Bundles the matching-arch wintun.dll
      # (required at runtime, loaded from the exe's folder) and the GeoLite2
      # Country database (for the client's chinadns geoip mode), so the zip is
      # self-contained — no separate downloads to get the client running.
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $name = "shadowvpn-${{ steps.ver.outputs.version }}-${{ matrix.target }}"
          $stage = "dist-stage/$name"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          $bin = "target/${{ matrix.target }}/release"
          Copy-Item "$bin/shadowvpn-server.exe", "$bin/shadowvpn-client.exe" $stage
          Copy-Item LICENSE, README.md $stage
          Copy-Item scripts/shadowvpn-client.ps1, scripts/shadowvpn-client.cmd $stage
          Copy-Item scripts/README.md "$stage/SCRIPTS.md"

          # --- Bundle the matching-arch wintun.dll ----------------------------
          # The Wintun zip lays DLLs out as wintun/bin/<arch>/wintun.dll. Map the
          # Rust target to Wintun's arch directory; an x64 exe needs amd64, an
          # ARM64 exe needs arm64 (a mismatch is the LoadLibrary error 193).
          $arch = switch ("${{ matrix.target }}") {
            "x86_64-pc-windows-msvc"  { "amd64" }
            "aarch64-pc-windows-msvc" { "arm64" }
            default { throw "no Wintun arch mapping for target ${{ matrix.target }}" }
          }
          $wzip = "wintun-${env:WINTUN_VERSION}.zip"
          Invoke-WebRequest -Uri "https://www.wintun.net/builds/$wzip" -OutFile $wzip `
            -MaximumRetryCount 3 -RetryIntervalSec 5
          Expand-Archive -Path $wzip -DestinationPath wintun-extract -Force
          $dll = "wintun-extract/wintun/bin/$arch/wintun.dll"
          if (-not (Test-Path $dll)) { throw "wintun.dll for '$arch' not found in $wzip" }
          Copy-Item $dll $stage

          # --- Bundle the GeoLite2 Country database (chinadns geoip mode) ------
          Invoke-WebRequest -Uri "${env:GEOIP_MMDB_URL}" -OutFile "$stage/GeoLite2-Country.mmdb" `
            -MaximumRetryCount 3 -RetryIntervalSec 5
          if ((Get-Item "$stage/GeoLite2-Country.mmdb").Length -lt 100000) {
            throw "GeoLite2-Country.mmdb download looks too small — bad mirror?"
          }

          # --- Third-party attribution for the bundled, non-project files -----
          @"
          This package bundles two third-party files, each under its own license:

          * wintun.dll (Wintun ${env:WINTUN_VERSION}, $arch) — the Wintun userspace
            TUN driver by WireGuard LLC. https://www.wintun.net/  Redistributed
            verbatim under its own license; not covered by ShadowVPN's LICENSE.

          * GeoLite2-Country.mmdb — this product includes GeoLite2 data created by
            MaxMind, available from https://www.maxmind.com/ , subject to the
            GeoLite2 End User License Agreement. Updated copies / your own
            licensed database can replace this file.
          "@ | Out-File -Encoding utf8 "$stage/THIRD-PARTY-NOTICES.txt"

          Compress-Archive -Path $stage -DestinationPath "$name.zip" -Force
          "ASSET=$name.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: shadowvpn-${{ matrix.target }}
          path: ${{ env.ASSET }}

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          fail_on_unmatched_files: true
          generate_release_notes: true
