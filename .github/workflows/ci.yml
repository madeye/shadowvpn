name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Formatting, lints, and unit tests.
  check:
    name: fmt + clippy + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --component rustfmt,clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: unit tests
        run: cargo test --lib

  # Windows build (x86_64-pc-windows-msvc): the client/server compile and the
  # unit tests pass. Confirms portability; full runtime testing on Windows is
  # done separately. The TUN layer uses Wintun (tun-rs); policy routing is
  # supported on Windows too (routes via the IP Helper API, DNS via netsh).
  build-windows:
    name: windows build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Build binaries
        run: cargo build --bins

      - name: Unit tests
        run: cargo test --lib

  # Docker-based end-to-end test: real server + client containers, each with a
  # TUN device, verifying connectivity through the encrypted tunnel for every
  # supported cipher.
  e2e:
    name: docker e2e (${{ matrix.cipher }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cipher:
          - chacha20-poly1305
          - aes-256-gcm
          - aes-128-gcm
    steps:
      - uses: actions/checkout@v4

      - name: Ensure the TUN device is available on the runner
        run: |
          sudo modprobe tun || true
          test -c /dev/net/tun

      - name: Run end-to-end tunnel test
        run: ./docker/run-e2e.sh "${{ matrix.cipher }}"

  # HTTP/3-over-tunnel test: the client routes all egress through the tunnel
  # (server NATs to the internet) and fetches a real QUIC site over HTTP/3,
  # proving ShadowVPN carries arbitrary UDP traffic. This depends on external
  # connectivity (and UDP/443 egress), so it runs on main + manual dispatch
  # rather than on every PR, and retries once to absorb transient blips.
  e2e-http3:
    name: docker e2e http3 (cloudflare-quic)
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure the TUN device is available on the runner
        run: |
          sudo modprobe tun || true
          test -c /dev/net/tun

      - name: Verify HTTP/3 through the tunnel
        run: ./docker/run-e2e-http3.sh || ./docker/run-e2e-http3.sh

  # Policy-routing test: a source-IP echo topology proves that, in both gfwlist
  # and chinadns mode, the client's split-DNS proxy + user-mode per-destination
  # routes send the selected domain through the tunnel while leaving the other on
  # the direct path. Fully self-contained (no external network); runs on every PR.
  e2e-policy:
    name: docker e2e policy (${{ matrix.mode }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mode:
          - gfwlist
          - chinadns
    steps:
      - uses: actions/checkout@v4

      - name: Ensure the TUN device is available on the runner
        run: |
          sudo modprobe tun || true
          test -c /dev/net/tun

      - name: Verify policy routing
        run: ./docker/run-e2e-policy.sh "${{ matrix.mode }}"
